<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
font-family:Arial;
color:white;
overflow:hidden;
}

h1{
font-size:40px;
margin-top:40px;
}

img{
width:220px;
border-radius:20px;
margin:10px;
display:none;
}

button{
padding:15px 25px;
font-size:18px;
background:#ff4d6d;
border:none;
border-radius:15px;
color:white;
margin-top:20px;
}

.cake{
font-size:70px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.heart{
position:absolute;
color:red;
animation: fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>

</head>

<body>

<h1>Happy Birthday ❤️</h1>

<div class="cake">🎂</div>

<p>
Hari ini dunia lebih indah karena kamu lahir.  
Aku selalu bangga sama kamu ❤️
</p>

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

<br>

<button onclick="showPhotos()">Lihat Kenangan Kita 📸</button>

<br>

<button onclick="secret()">Klik Pesan Rahasia 💌</button>

<audio autoplay loop>
<source src="lagu.mp3" type="audio/mp3">
</audio>

<script>

function showPhotos(){
let photos=document.querySelectorAll("img");
photos.forEach((img,i)=>{
setTimeout(()=>{
img.style.display="block";
}, i*1000);
});
}

function secret(){
alert("Aku sayang kamu ❤️ Semoga kita selalu bersama.");
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+20+"px";
heart.style.animationDuration=Math.random()*3+2+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
